name: Deploy correct-ipc

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: false
        default: "dev"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug tree (one level)
        run: |
          pwd
          ls
          find . -maxdepth 3 -type f -name "*test*.py" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.test.txt ]; then pip install -r requirements.test.txt; fi
          if [ -f requirements.dev.txt ]; then pip install -r requirements.dev.txt; fi
          pip install pytest

      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: |
          PYTHONPATH=. python -m pytest -q

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Set image tag
        run: |
          echo "IMAGE=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/correct-ipc:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t "$IMAGE" .

      - name: Push Docker image
        run: |
          docker push "$IMAGE"

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /home/runner/yandex-cloud -n
          echo "/home/runner/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud CLI
        run: |
          printf '%s' '${{ secrets.YC_SA_JSON_CREDENTIALS }}' > key.json
          /home/runner/yandex-cloud/bin/yc config profile create ci-profile || true
          /home/runner/yandex-cloud/bin/yc config set service-account-key key.json

      - name: Get kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          /home/runner/yandex-cloud/bin/yc managed-kubernetes cluster get-credentials \
            --id "${{ secrets.YC_K8S_CLUSTER_ID }}" \
            --external \
            --force

      - name: Check cluster access
        run: |
          kubectl get nodes

      - name: Create runtime secrets
        run: |
          kubectl create secret generic s3-creds \
            --from-literal=access-key='${{ secrets.YC_PROD_BUCKET_AK }}' \
            --from-literal=secret-key='${{ secrets.YC_PROD_BUCKET_SK }}' \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry regcred \
            --docker-server=cr.yandex \
            --docker-username=json_key \
            --docker-password='${{ secrets.YC_SA_JSON_CREDENTIALS }}' \
            --docker-email=none@example.com \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render deployment manifest
        run: |
          sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml > k8s/deployment.rendered.yaml
      
      - name: Deploy rendered manifest
        run: |
          kubectl apply -f k8s/deployment.rendered.yaml
          kubectl rollout status deploy/correct-ipc